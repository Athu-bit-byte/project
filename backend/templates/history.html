<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My History - FarmOne</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/color/96/000000/wheat.png">
    <style>
        .history-section {
            margin-bottom: 3rem;
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .history-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid var(--primary-green);
        }
        .history-date {
            font-size: 0.9rem;
            color: var(--gray-medium);
            margin-bottom: 0.5rem;
        }
        .history-detail {
            margin: 0.5rem 0;
        }
        .history-detail strong {
            color: var(--dark-green);
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">
                    <i class="fas fa-seedling"></i>
                    <span>FarmOne</span>
                </a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/tool">Tools</a></li>
                    <li><a href="/#contact">Contact</a></li>
                </ul>
                <div class="auth-buttons">
                    <!-- filled by script -->
                </div>
            </nav>
        </div>
    </header>

    <main id="main-content" class="container">
        <h1 style="text-align: center; margin: 2rem 0;">My Activity History</h1>
        <div id="history-container">
            <!-- History will be loaded here by JavaScript -->
            <div style="text-align: center; padding: 3rem;">
                <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: var(--primary-green);"></i>
                <p>Loading your history...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <h4>FarmOne</h4>
                    <p>Smart solutions for modern agriculture.</p>
                </div>
                <div class="footer-links">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/tool">Tools</a></li>
                        <li><a href="/#contact">Contact</a></li>
                    </ul>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2026 FarmOne ...............</p>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>
