<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FarmOne</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="https://img.icons8.com/color/96/000000/wheat.png">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        <div class="container">
            <nav class="navbar">
                <a href="/" class="logo">
                    <i class="fas fa-seedling"></i>
                    <span>FarmOne</span>
                </a>
                
                <div class="auth-buttons">
                    <!-- filled by script -->
                </div>
            </nav>
        </div>
    </header>

    <main id="main-content" class="container">
        <div style="max-width: 380px; margin: 2rem auto; background: white; padding: 1.5rem; border-radius: 15px; box-shadow: var(--shadow);">
            <h2 style="text-align: center; color: var(--primary-green); margin-top: 0; margin-bottom: 0.5rem;">Create an Account</h2>
            <p style="text-align: center; margin-bottom: 1rem; font-size: 0.95rem;">Join to save your history.</p>

            <form id="signup-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required minlength="6">
                </div>
                <div class="form-group" style="margin-bottom: 1.2rem;">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-bottom: 1rem;">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
            </form>

            <p style="text-align: center; margin: 0.5rem 0 0;">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <h4>FarmOne</h4>
                    <p>Smart solutions for modern agriculture.</p>
                </div>
                <div class="footer-links">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/tool">Tools</a></li>
                        <li><a href="/#contact">Contact</a></li>
                    </ul>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2026 FarmOne ...............</p>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</body>
</html>
